version: "3.9"

services:

  backend:
    build: ./Backend
    container_name: lpr_backend
    ports:
      - "8000:8000"
    volumes:
      - ./Backend/temp:/app/temp
      - ./Backend/production_models:/app/production_models
    restart: always

  frontend:
    build: ./Frontend
    container_name: lpr_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_WS_URL: ws://backend:8000/ws
    depends_on:
      - backend
    restart: always